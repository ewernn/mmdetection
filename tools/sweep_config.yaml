program: tools/train_c2.py
method: grid
name: c2_sweep
command:
  - ${env}
  - python
  - ${program}
  - "--colab"
  - "--backbone"
  - "resnet152"
  - "--wandb"
  - ${args}
parameters:
  learning_rate:
    values: [1e-4]
  # freeze_layers:
